name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore backend
        run: dotnet restore apps/api/MonorepoBackend.sln

      - name: Build backend
        run: dotnet build apps/api/MonorepoBackend.sln --no-restore

      - name: Test backend
        run: dotnet test apps/api/MonorepoBackend.sln --no-build --verbosity normal

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --dir apps/web build

      - name: Test frontend
        run: pnpm --dir apps/web test
